<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTrack</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-screen">
        <h1 class="splash-title">Crypto<span>Track</span></h1>
        <div class="splash-loader"></div>
    </div>
    
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="container">
        <h1 class="title">Crypto<span>Track</span></h1>

        <div class="currency-selector">
            <button class="currency-btn active" onclick="setCurrency('usd')">USD</button>
            <button class="currency-btn" onclick="setCurrency('eur')">EUR</button>
            <button class="currency-btn" onclick="setCurrency('try')">TRY</button>
        </div>

        <div class="tabs">
            <button class="tab" onclick="switchTab('search')">Search</button>
            <button class="tab" onclick="switchTab('trending')">Trending</button>
            <button class="tab" onclick="switchTab('compare')">Compare</button>
            <button class="tab" onclick="switchTab('favorites')">Favorites</button>
            <button class="tab active" onclick="switchTab('portfolio')">Portfolio</button>
        </div>

        <!-- Search Tab -->
        <div id="tab-search" class="tab-content hidden">
            <div class="search-box">
                <div class="autocomplete-wrapper">
                    <input type="text" id="searchInput" placeholder="Search coin... (e.g. bitcoin)" autocomplete="off" />
                    <div id="searchAutocomplete" class="autocomplete-results"></div>
                </div>
                <button onclick="searchCoin()">Search</button>
            </div>
            <div id="coinCard" class="coin-card hidden">
                <div class="coin-header">
                    <img id="coinImg" src="" alt="">
                    <div>
                        <h2 id="coinName"></h2>
                        <span id="coinSymbol"></span>
                    </div>
                    <div class="price-box">
                        <h2 id="coinPrice"></h2>
                        <span id="coinChange"></span>
                    </div>
                    <button class="fav-btn" id="favBtn" onclick="toggleFavorite()">☆</button>
                </div>
                <div class="stats">
                    <div class="stat"><p>Market Cap</p><h3 id="marketCap"></h3></div>
                    <div class="stat"><p>24h High</p><h3 id="high24"></h3></div>
                    <div class="stat"><p>24h Low</p><h3 id="low24"></h3></div>
                    <div class="stat"><p>Volume</p><h3 id="volume"></h3></div>
                </div>
                <canvas id="priceChart"></canvas>
            </div>
            <div id="errorMsg" class="error hidden">Coin not found. Try again.</div>
            <div id="loader" class="loader hidden"></div>
        </div>

        <!-- Trending Tab -->
        <div id="tab-trending" class="tab-content hidden">
            <h2 class="section-title">Top 10 Coins</h2>
            <div id="trendingList" class="coin-list"></div>
            <div id="trendingLoader" class="loader hidden"></div>
        </div>

        <!-- Compare Tab -->
        <div id="tab-compare" class="tab-content hidden">
            <div class="compare-inputs">
                <div class="autocomplete-wrapper">
                    <input type="text" id="compareInput1" placeholder="First coin (e.g. bitcoin)" autocomplete="off" />
                    <div id="compare1Autocomplete" class="autocomplete-results"></div>
                </div>
                <div class="autocomplete-wrapper">
                    <input type="text" id="compareInput2" placeholder="Second coin (e.g. ethereum)" autocomplete="off" />
                    <div id="compare2Autocomplete" class="autocomplete-results"></div>
                </div>
                <button onclick="compareCoin()">Compare</button>
            </div>
            <div id="compareResult" class="hidden">
                <div class="compare-cards">
                    <div class="compare-card" id="compareCard1"></div>
                    <div class="compare-vs">VS</div>
                    <div class="compare-card" id="compareCard2"></div>
                </div>
                <canvas id="compareChart"></canvas>
            </div>
            <div id="compareLoader" class="loader hidden"></div>
            <div id="compareError" class="error hidden">One or both coins not found.</div>
        </div>

        <!-- Favorites Tab -->
        <div id="tab-favorites" class="tab-content hidden">
            <h2 class="section-title">Favorites</h2>
            <div id="favoritesList" class="coin-list"></div>
            <div id="noFavorites" class="error">No favorites yet. Search a coin and press ☆</div>
        </div>

        <!-- Portfolio Tab -->
        <div id="tab-portfolio" class="tab-content">
            <h2 class="section-title">My Portfolio</h2>
            <div class="portfolio-summary">
                <p>Total Balance</p>
                <h1 id="portfolioTotal">$0.00</h1>
                <div id="portfolioChange" class="portfolio-change"></div>

                <!-- History Chart Timeframes -->
                <div class="timeframe-selector" id="portfolioTimeframes" style="display: none;">
                    <button class="time-btn active" onclick="loadPortfolioHistory(1)">1D</button>
                    <button class="time-btn" onclick="loadPortfolioHistory(7)">7D</button>
                    <button class="time-btn" onclick="loadPortfolioHistory(30)">1M</button>
                    <button class="time-btn" onclick="loadPortfolioHistory(90)">3M</button>
                    <button class="time-btn" onclick="loadPortfolioHistory(365)">1Y</button>
                </div>
                
                <div style="margin-top: 20px;">
                    <canvas id="portfolioHistoryChart"></canvas>
                </div>

                <div style="max-width: 200px; margin: 30px auto 0;">
                    <p style="color: #a0aec0; font-size: 0.85rem; margin-bottom: 15px; letter-spacing: 1px;">ASSET DISTRIBUTION</p>
                    <canvas id="portfolioChart"></canvas>
                </div>
            </div>
            <div class="search-box">
                <div class="autocomplete-wrapper">
                    <input type="text" id="portfolioInput" placeholder="Coin ID (e.g. bitcoin)" autocomplete="off" />
                    <div id="portfolioAutocomplete" class="autocomplete-results"></div>
                </div>
                <input type="number" id="portfolioAmount" placeholder="Amount (e.g. 0.5)" step="any" min="0" />
                <button onclick="addToPortfolio()">Add</button>
            </div>
            <div id="portfolioList" class="coin-list"></div>
            <div id="portfolioLoader" class="loader hidden"></div>
        </div>
        <!-- Footer Signature -->
        <div class="footer-signature">
            <p>Developed with <span style="color: #ef4444;">❤</span> by <a href="https://github.com/SwomSanchez" target="_blank" style="text-decoration: none;"><strong>Swom Sânchez</strong></a></p>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
